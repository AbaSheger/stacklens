name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn --batch-mode clean package -DskipTests

      - name: Rename JAR
        run: mv target/stacklens-*.jar target/stacklens.jar

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: StackLens ${{ github.ref_name }}
          body: |
            ## What's changed in ${{ github.ref_name }}
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Download & Run

            **Requirements:** Java 17 or higher

            ```bash
            # Download stacklens.jar from the assets below, then:
            java -jar stacklens.jar analyze app.log
            java -jar stacklens.jar analyze app.log --summary
            cat app.log | java -jar stacklens.jar analyze -
            java -jar stacklens.jar analyze --text "java.lang.NullPointerException at MyService.java:42"
            ```

            ### Optional: Create an alias

            **Linux/macOS** — add to `~/.bashrc` or `~/.zshrc`:
            ```bash
            alias stacklens='java -jar /path/to/stacklens.jar'
            ```

            **Windows PowerShell** — add to your `$PROFILE`:
            ```powershell
            function stacklens { java -jar C:\path\to\stacklens.jar $args }
            ```
          files: target/stacklens.jar
          draft: false
          prerelease: false
